# futu-opend 配置文件示例（TOML 格式，v1.4.2+）
#
# 用法：
#   1. 通过 --config 指定：./futu-opend --config /etc/futu-opend/futu-opend.toml
#   2. 或放在同目录名为 futu-opend.toml 会自动加载
#   3. CLI 参数始终覆盖配置文件中的值
#
# 如果想兼容 C++ 的 XML 格式，用 FutuOpenD.xml（参考同目录的示例）
#
# 权限建议：chmod 0640，root:futu（避免密码泄露）

# ========== 登录 ==========

# 富途账号（手机号 / 邮箱）—— 或用 --login-account 参数，或 FUTU_ACCOUNT env
# login_account = "你的账号"

# 登录密码明文（和 login_pwd_md5 二选一）
# login_pwd = "你的密码"

# 或 MD5 形式
# login_pwd_md5 = "md5hash"

# 登录区域：cn / hk / us，默认 gz
# login_region = "hk"

# 账号平台（v1.4.14+）—— 决定认证服务器
#   futunn（默认）—— 牛牛账号（CN / HK 归属），auth.futunn.com
#   moomoo         —— moomoo 账号（US / SG / AU / JP / CA 归属），auth.moomoo.com
# 同手机号 / 邮箱可以在两边各注册独立账号，显式指定避免登错
# platform = "moomoo"

# ========== 服务监听 ==========

# 监听 IP，默认 0.0.0.0（生产环境建议 127.0.0.1 或私网地址）
ip = "0.0.0.0"

# FTAPI TCP 端口（原生协议，Python/C++ SDK 连这个）
port = 11111

# REST API 端口（/health /api/* 等）
# rest_port = 22222

# gRPC 端口
# grpc_port = 33333

# WebSocket 端口
# websocket_port = 44444

# Telnet 调试端口（仅开发用）
# telnet_port = 55555
# Telnet 监听 IP 默认 127.0.0.1；如需远程调试必须显式覆盖
# telnet_ip = "127.0.0.1"

# ========== 安全 ==========

# RSA 私钥文件路径（协议加密，留空用内置默认）
# 路径读失败 = daemon abort（不再 silent fallback）
# rsa_private_key = "/etc/futu-opend/rsa_key.pem"

# REST / gRPC / WebSocket 各 surface 的 Bearer Token keys 文件
# 三个 surface 各自独立, 也可指向同一文件
# rest_keys_file = "/etc/futu-opend/rest-keys.json"
# grpc_keys_file = "/etc/futu-opend/grpc-keys.json"
# ws_keys_file   = "/etc/futu-opend/ws-keys.json"

# 显式允许 native TCP (FTAPI port) 在配置 keys-file 时仍接受无 auth 连接
# (v1.4.104 security hardening). 默认 false → 配 keys-file 时关闭 TCP 端口.
# allow_tcp_unauthenticated = false

# 审计日志输出: JSONL 文件 (单文件) 或目录 (每日滚动)
# audit_log = "/var/log/futu-audit.jsonl"

# IANA timezone (用于 hours_window 限额检查等 local-time 语义)
# 优先级: --tz CLI > [tz] TOML > TZ env var > UTC
# tz = "Asia/Hong_Kong"

# ========== 日志 ==========

# 日志级别：error / warn / info / debug / trace
# TOML 非法值 (e.g. "wtf" / "warning") 直接 reject
# 合法 enum: trace/debug/info/warn/error/off
log_level = "info"

# 语言：chs（简体）/ cht（繁体）/ en（英文）
lang = "chs"

# ========== 仅 CLI 可传 (TOML 不支持) ==========
#
# 以下字段是运维 / 调试 / 一次性流程 flag, **不能**写在 TOML; 写了会触发
# unknown field fatal:
#
#   --device-id <hex>          覆盖持久化的 16-hex device_id
#   --reset-device             清 device_id + credentials 文件
#   --setup-only               完成 SMS 验证后退出 (systemd / Docker 首登)
#   --verify-code <code>       直接传 SMS 码 (Telegram 中继场景)
#   --json-log                 stderr JSONL 格式
#   --inject-auth-failure-every <SEC>   仅 dev-flags feature build (tester only)
#
# 这些 flag 只能在 systemd Unit 的 `ExecStart=` 命令行直接写, 或 ad-hoc shell
# 调用. 持久 config 文件 (本 TOML) 仅写跨 daemon 重启稳定的字段.
